name: "Issue AI-less Classifier"

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:

jobs:
  label-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Analyze Content and Apply Labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const rules = {
              "type:bug": [/\bbug\b/i, /\bcrash\b/i, /\berror\b/i, /\bfail\b/i, /\bbroken\b/i, /\bvulnerability\b/i, /\bflaw\b/i],
              "type:performance": [/\bslow\b/i, /\bperformance\b/i, /\blatency\b/i, /\boptimize\b/i, /\bspeed\b/i, /\bbottleneck\b/i, /\btimeout\b/i, /\bperf\b/i],
              "type:security": [/\bsecurity\b/i, /\bauth\b/i, /\bencryption\b/i, /\bssl\b/i, /\btoken\b/i, /\bhack\b/i, /\bdos\b/i, /\bsecret\b/i],
              "type:design": [/\bdesign\b/i, /\bui\b/i, /\bux\b/i, /\bcss\b/i, /\bfrontend\b/i, /\bstyle\b/i, /\btheme\b/i, /\bicon\b/i],
              "type:refactor": [/\brefactor\b/i, /\bclean code\b/i, /\bstructure\b/i, /\brewrite\b/i, /\bsimplify\b/i, /\bcleanup\b/i],
              "type:accessibility": [/\baccessibility\b/i, /\ba11y\b/i, /\bcontrast\b/i, /\bscreen reader\b/i, /\baria\b/i, /\balt text\b/i],
              "type:docs": [/\bdoc\b/i, /\bdocs\b/i, /\breadme\b/i, /\bcomment\b/i, /\btypo\b/i, /\bguide\b/i, /\bwiki\b/i],
              "type:testing": [/\btest\b/i, /\btests\b/i, /\bpytest\b/i, /\bunittest\b/i, /\bcoverage\b/i, /\bmock\b/i],
              "type:feature": [/\bfeature\b/i, /\brequest\b/i, /\bimplement\b/i, /\bnew idea\b/i, /\benhance\b/i, /\baddition\b/i]
            };

            const { owner, repo } = context.repo;

            function getLabelsForText(title) {
              const titleText = (title || '').toLowerCase();
              const matched = [];

              for (const [label, patterns] of Object.entries(rules)) {
                for (const pattern of patterns) {
                  if (pattern.test(titleText)) {
                    matched.push(label);
                    break;
                  }
                }
              }

              if (matched.includes("type:bug") && matched.includes("type:feature")) {
                const index = matched.indexOf("type:feature");
                if (index > -1) matched.splice(index, 1);
              }

              return matched.length > 0 ? matched.slice(0, 2) : ["triage"];
            }

            const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            async function checkRateLimit(headers) {
              const remaining = headers['x-ratelimit-remaining'];
              const resetTime = headers['x-ratelimit-reset'];

              if (remaining !== undefined && parseInt(remaining, 10) < 10) {
                const wait = resetTime 
                  ? Math.max(1, parseInt(resetTime, 10) - Math.floor(Date.now() / 1000) + 1) * 1000 
                  : 60000;
                console.log(`Rate limit low (${remaining} remaining). Sleeping ${wait / 1000}s...`);
                await sleep(wait);
              }
            }

            async function updateLabelsSafely(issueNum, newlyCalculatedLabels) {
              try {
                const { data: issueData, headers: getHeaders } = await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number: issueNum,
                });
                await checkRateLimit(getHeaders);

                const currentTags = issueData.labels.map(l => typeof l === 'string' ? l : l.name);
                const preservedTags = currentTags.filter(tag => !tag.startsWith('type:'));
                const finalPayloadTags = Array.from(new Set([...preservedTags, ...newlyCalculatedLabels]));

                const { headers: putHeaders } = await github.rest.issues.setLabels({
                  owner,
                  repo,
                  issue_number: issueNum,
                  labels: finalPayloadTags,
                });
                await checkRateLimit(putHeaders);

                console.log(`Successfully cleaned & updated labels on Issue #${issueNum}: ${finalPayloadTags.join(', ')}`);
              } catch (error) {
                console.error(`Error managing labels on Issue #${issueNum}: ${error.message}`);
              }
            }

            // ---- EXECUTION ROUTINE ----
            async function main() {
              if (context.eventName === "workflow_dispatch") {
                console.log("Running deep self-cleaning manual sweep across existing issues...");
                let page = 1;
                let processed = 0;
                const perPage = 100;

                while (true) {
                  const { data: issues, headers } = await github.rest.issues.listForRepo({
                    owner,
                    repo,
                    state: 'open',
                    per_page: perPage,
                    page: page,
                  });

                  await checkRateLimit(headers);
                  if (issues.length === 0) break;

                  for (const issue of issues) {
                    if (issue.pull_request) continue;

                    const labels = getLabelsForText(issue.title);
                    await updateLabelsSafely(issue.number, labels);
                    processed++;

                    const randomDelay = Math.random() * (1500 - 500) + 500;
                    await sleep(randomDelay);
                  }
                  page++;
                }
                console.log(`Sweep complete. Processed ${processed} issues.`);
              } else {
                const issueNum = context.payload.issue?.number;
                const issueTitle = context.payload.issue?.title;

                if (!issueNum) {
                  core.setFailed("No issue context found in event payload.");
                  return;
                }

                const labels = getLabelsForText(issueTitle);
                await updateLabelsSafely(issueNum, labels);
              }
            }

            await main();